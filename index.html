<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal World</title>
    <link rel="icon" href="favicon.ico">

    <!-- Open Graph / URL Embed Preview -->
    <meta property="og:type" content="video.other">
    <meta property="og:title" content="Menger World">
    <meta property="og:description" content="Explore an infinite fractal world">
    <meta property="og:url" content="https://nicojapas.github.io/menger-world/">
    <meta property="og:image" content="https://nicojapas.github.io/menger-world/preview-thumb.jpg">
    <meta property="og:video" content="https://nicojapas.github.io/menger-world/preview.mp4">
    <meta property="og:video:type" content="video/mp4">
    <meta property="og:video:width" content="1280">
    <meta property="og:video:height" content="800">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="player">
    <meta name="twitter:title" content="Menger World">
    <meta name="twitter:description" content="Explore an infinite fractal world">
    <meta name="twitter:image" content="https://nicojapas.github.io/menger-world/preview-thumb.jpg">
    <meta name="twitter:player" content="https://nicojapas.github.io/menger-world/preview.mp4">
    <meta name="twitter:player:width" content="1280">
    <meta name="twitter:player:height" content="800">
    <link rel="stylesheet" href="styles.css">
    <!-- ElevenLabs Conversational AI SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@elevenlabs/client@latest/dist/lib.iife.js"></script>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- Setup Screen - BYOK configuration -->
    <div id="setup-overlay" class="overlay">
        <div class="overlay-content">
            <h1 class="setup-title">MENGER WORLD</h1>

            <!-- Backend Selector -->
            <div class="section-label">Select Backend</div>
            <div class="backend-selector">
                <button id="backend-justfly" class="backend-btn">Just Fly</button>
                <button id="backend-elevenlabs" class="backend-btn selected">ElevenLabs</button>
                <button id="backend-langgraph" class="backend-btn">LangGraph</button>
            </div>

            <!-- ElevenLabs Config -->
            <div id="elevenlabs-config" class="config-section">
                <label class="section-label">Agent ID</label>
                <input id="elevenlabs-agent-id" type="text" placeholder="agent_xxxxxxxxxxxxx" class="config-input">
                <a href="https://elevenlabs.io/app/conversational-ai" target="_blank" class="config-link">
                    Create an agent at elevenlabs.io →
                </a>
            </div>

            <!-- LangGraph Config (hidden by default) -->
            <div id="langgraph-config" class="config-section hidden">
                <label class="section-label">Groq API Key</label>
                <input id="langgraph-api-key" type="password" placeholder="gsk_xxxxxxxxxxxxx" class="config-input">
                <label class="section-label">Server URL</label>
                <input id="langgraph-server-url" type="text" placeholder="http://localhost:8765" class="config-input">
                <div class="config-hint">
                    Run <code>python agent/server.py</code> locally
                </div>
            </div>

            <!-- Error Message -->
            <div id="setup-error"></div>

            <!-- Start Button -->
            <button id="setup-start-btn" class="start-btn">START</button>
        </div>
    </div>

    <div id="start-overlay" class="overlay">
        <div class="overlay-content">
            <!-- Connecting state -->
            <div id="connecting-state">
                <div class="state-title">CONNECTING...</div>
                <div class="state-subtitle">Initializing agent</div>
            </div>
            <!-- Error state (hidden initially) -->
            <div id="error-state" class="hidden">
                <div class="state-title">CONNECTION FAILED</div>
                <div id="error-message"></div>
                <div class="state-subtitle">Check console for details</div>
            </div>
        </div>
    </div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
