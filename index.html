<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal World</title>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; background: #000; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="debug" style="
        position: fixed;
        top: 20px;
        left: 20px;
        color: white;
        font-family: monospace;
        font-size: 16px;
        z-index: 50;
        text-shadow: 0 0 4px black;
        display: none;
    "></div>
    <div id="start-overlay" style="
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 100;
    ">
        <div style="
            color: white;
            font-family: system-ui, sans-serif;
            text-align: center;
        ">
            <div style="font-size: 24px; margin-bottom: 8px;">Click to Enter</div>
            <div style="font-size: 14px; opacity: 0.6;">Audio powered by ElevenLabs</div>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
