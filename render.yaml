services:
  - type: web
    name: cool-room
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: GROQ_API_KEY
        sync: false  # Set this in the Render dashboard
      - key: ELEVENLABS_API_KEY
        sync: false  # Optional: for ElevenLabs TTS
      - key: USE_ELEVENLABS
        value: "false"  # Set to "true" if using ElevenLabs
      - key: ENV
        value: "production"
    healthCheckPath: /health
